services:
  app:
    build: .
    image: krivko-app:latest
    container_name: krivko-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./data:/app/data
    # Подключаемся к существующей сети loveshop-стека.
    # Reverse proxy (loveshop-proxy-1) будет ходить сюда по имени krivko-app:3000.
    networks:
      - loveshop_default

networks:
  loveshop_default:
    external: true
