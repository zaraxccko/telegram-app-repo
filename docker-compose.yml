services:
  app:
    build: .
    image: krivko-app:latest
    container_name: krivko-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./data:/app/data
    # На VPS уже работает другой reverse proxy на 80/443.
    # Пробрасываем приложение на свободный порт хоста 3001 (только на localhost).
    # Внешний прокси (Caddy/Nginx на хосте) проксирует домен → 127.0.0.1:3001.
    ports:
      - "127.0.0.1:3001:3000"
